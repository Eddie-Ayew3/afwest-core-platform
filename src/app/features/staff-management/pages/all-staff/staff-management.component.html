<div class="flex h-full bg-background overflow-hidden">
  <div class="flex-1 flex flex-col p-6 overflow-hidden min-h-0">

    <!-- Breadcrumb -->
    <tolle-breadcrumb class="mb-3">
      <tolle-breadcrumb-item>
        <tolle-breadcrumb-link>Home</tolle-breadcrumb-link>
      </tolle-breadcrumb-item>
      <tolle-breadcrumb-separator>
        <i class="ri-arrow-right-double-line text-muted-foreground/50"></i>
      </tolle-breadcrumb-separator>
      <tolle-breadcrumb-item>
        <tolle-breadcrumb-link>HR</tolle-breadcrumb-link>
      </tolle-breadcrumb-item>
      <tolle-breadcrumb-separator>
        <i class="ri-arrow-right-double-line text-muted-foreground/50"></i>
      </tolle-breadcrumb-separator>
      <tolle-breadcrumb-item>
        <tolle-breadcrumb-link [active]="true">Staff Management</tolle-breadcrumb-link>
      </tolle-breadcrumb-item>
    </tolle-breadcrumb>

    <!-- Page Header -->
    <div class="flex justify-between items-center mb-4">
      <div>
        <h1 class="text-2xl font-bold">Staff Management</h1>
        <p class="text-muted-foreground mt-1">Manage office and operations staff</p>
      </div>
      <tolle-button variant="default" (click)="navigateToNewStaff()">
        <i class="ri-add-line mr-2"></i>
        Add Staff
      </tolle-button>
    </div>

    <!-- Data Table -->
    <div class="flex-1 min-h-0">
      <tolle-data-table
        [data]="staff"
        [columns]="columns"
        [stickyHeader]="true"
        [paginate]="true"
        [pageSizeOptions]="[5, 10, 25, 50]">

        <ng-template tolleCell="name" let-row="row">
          <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary font-semibold shrink-0">
              {{ row.name.charAt(0) }}
            </div>
            <div class="min-w-0">
              <p class="font-medium truncate">{{ row.name }}</p>
              <p class="text-xs text-muted-foreground truncate">ID: {{ row.id }}</p>
            </div>
          </div>
        </ng-template>

        <ng-template tolleCell="role" let-row="row">
          <p class="text-sm truncate">{{ row.role }}</p>
          <p class="text-xs text-muted-foreground truncate">{{ row.site }}</p>
        </ng-template>

        <ng-template tolleCell="status" let-row="row">
          <tolle-badge [variant]="row.status === 'Active' ? 'default' : 'secondary'" size="sm">
            {{ row.status }}
          </tolle-badge>
        </ng-template>

        <ng-template tolleCell="contact" let-row="row">
          <p class="text-sm truncate">{{ row.contact }}</p>
        </ng-template>

        <ng-template tolleCell="actions" let-row="row">
          <div class="flex items-center justify-end gap-2">
            <tolle-button variant="default" size="xs">Edit</tolle-button>
            <tolle-button variant="ghost" size="icon-sm" tolleTooltip="View details" placement="top" (click)="viewPerson(row)">
              <i class="ri-eye-line"></i>
            </tolle-button>
            <div class="relative">
              <tolle-button variant="ghost" size="icon-sm" tolleTooltip="More actions" placement="top" [tolleDropdownTrigger]="staffActionMenu">
                <i class="ri-more-2-fill"></i>
              </tolle-button>
              <tolle-dropdown-menu #staffActionMenu>
                <button class="w-full text-left px-3 py-2 hover:bg-muted/50 text-sm flex items-center gap-2 rounded-sm">
                  <i class="ri-mail-line"></i> Send Email
                </button>
                <div class="h-px bg-border my-1"></div>
                <button class="w-full text-left px-3 py-2 hover:bg-muted/50 text-sm flex items-center gap-2 text-destructive rounded-sm">
                  <i class="ri-delete-bin-line"></i> Delete
                </button>
              </tolle-dropdown-menu>
            </div>
          </div>
        </ng-template>

      </tolle-data-table>
    </div>

  </div>
</div>
