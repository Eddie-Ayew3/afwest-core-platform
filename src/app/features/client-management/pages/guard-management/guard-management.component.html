<!-- New guard modal -->
<ng-template #newGuardModal>
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium mb-2">Guard Name</label>
      <input type="text" placeholder="Enter guard full name" class="w-full p-2 border rounded-md bg-background">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Staff ID</label>
      <input type="text" placeholder="e.g. GD-001" class="w-full p-2 border rounded-md bg-background">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Assigned Site</label>
      <select class="w-full p-2 border rounded-md bg-background">
        <option value="">Select site</option>
        <option *ngFor="let site of availableSites" [value]="site">{{ site }}</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Shift</label>
      <select class="w-full p-2 border rounded-md bg-background">
        <option value="">Select shift</option>
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
        <option value="Night">Night</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Contact Number</label>
      <input type="tel" placeholder="Enter phone number" class="w-full p-2 border rounded-md bg-background">
    </div>
  </div>
</ng-template>
